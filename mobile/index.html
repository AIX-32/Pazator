<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PAZATOR — SHAHED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'DM Mono', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: crosshair;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      height: 44px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .tb-word {
      font-family: 'Anton', sans-serif;
      font-size: 15px;
      letter-spacing: 0.15em;
    }

    .tb-sub {
      font-size: 8px;
      letter-spacing: 0.45em;
      color: #444;
    }

    .globe-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
    }

    canvas {
      display: block;
    }

    /* FORM */
    .form-wrap {
      flex-shrink: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .name-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0 20px;
      gap: 12px;
    }

    .name-lbl {
      font-size: 8px;
      letter-spacing: 0.45em;
      color: #444;
      white-space: nowrap;
    }

    .name-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 16px 0;
      color: #fff;
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      outline: none;
      -webkit-text-fill-color: #fff;
    }

    .name-input::placeholder {
      -webkit-text-fill-color: rgba(255, 255, 255, 0.12);
    }

    .send-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #fff;
      color: #000;
      font-family: 'Anton', sans-serif;
      font-size: 16px;
      letter-spacing: 0.12em;
      border: none;
      cursor: crosshair;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:active {
      background: #ccc;
    }

    .send-btn.busy {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.2);
      pointer-events: none;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      min-height: 36px;
    }

    .sdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .sdot.on {
      background: #fff;
      animation: blink 1.6s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.1
      }
    }

    .smsg {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: #444;
    }

    .smsg.on {
      color: #fff;
    }
  </style>
</head>

<body>

  <header class="topbar">
    <div class="tb-word">PAZATOR</div>
    <div class="tb-sub">SHAHED - LOCATION SYSTEM</div>
  </header>

  <div class="globe-wrap">
    <canvas id="globe"></canvas>
  </div>

  <div class="form-wrap">
    <div class="name-row">
      <span class="name-lbl">NAME</span>
      <input class="name-input" id="nameInput" type="text" placeholder="YOUR NAME" autocomplete="off"
        autocapitalize="characters">
    </div>
    <button class="send-btn" id="trackBtn">
      <span>SEND LOCATION</span>
      <span>→</span>
    </button>
    <div class="status-row">
      <div class="sdot" id="sdot"></div>
      <div class="smsg" id="smsg">WAITING</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const canvas = document.getElementById('globe');
      const wrap = canvas.parentElement;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      function resize() {
        const s = Math.min(wrap.clientWidth, wrap.clientHeight) * 0.82;
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';
        canvas.width = s * dpr;
        canvas.height = s * dpr;
      }
      resize();
      window.addEventListener('resize', resize);

      const ctx = canvas.getContext('2d');
      let angle = 0;

      function project(x, y, z, s) {
        return { x: x * s, y: y * s };
      }

      function rotY(x, y, z, a) {
        return { x: x * Math.cos(a) + z * Math.sin(a), y, z: -x * Math.sin(a) + z * Math.cos(a) };
      }

      function drawGlobe() {
        const w = canvas.width / dpr, h = canvas.height / dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, w, h);

        const cx = w / 2, cy = h / 2;
        const R = w * 0.44;

        const LATS = 8;
        for (let i = 1; i < LATS; i++) {
          const phi = (Math.PI / LATS) * i - Math.PI / 2;
          const r2 = Math.cos(phi) * R;
          const yy = cy + Math.sin(phi) * R;

          ctx.beginPath();
          const steps = 80;
          let first = true;
          for (let s = 0; s <= steps; s++) {
            const lon = (2 * Math.PI / steps) * s;
            const px = Math.cos(lon) * r2;
            const pz = Math.sin(lon) * r2;
            const rot = rotY(px, 0, pz, angle);
            const screenX = cx + rot.x;
            const screenY = yy;
            const alpha = rot.z < 0 ? 0.07 : 0.22;
            if (first) { ctx.moveTo(screenX, screenY); first = false; }
            else ctx.lineTo(screenX, screenY);
          }
          ctx.strokeStyle = `rgba(255,255,255,0.18)`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }

        const LONS = 12;
        for (let i = 0; i < LONS; i++) {
          const baseLon = (2 * Math.PI / LONS) * i;
          const steps = 60;
          ctx.beginPath();
          let first = true;
          for (let s = 0; s <= steps; s++) {
            const phi = (Math.PI / steps) * s - Math.PI / 2;
            const lon = baseLon + angle;
            const px = Math.cos(phi) * Math.cos(lon) * R;
            const py = Math.sin(phi) * R;
            const pz = Math.cos(phi) * Math.sin(lon) * R;
            const screenX = cx + px;
            const screenY = cy - py;
            const back = pz < 0;
            if (first) { ctx.moveTo(screenX, screenY); first = false; }
            else ctx.lineTo(screenX, screenY);
          }
          ctx.strokeStyle = 'rgba(255,255,255,0.18)';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }

        const dimGrd = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, R);
        dimGrd.addColorStop(0, 'rgba(0,0,0,0)');
        dimGrd.addColorStop(1, 'rgba(0,0,0,0.55)');
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.fillStyle = dimGrd;
        ctx.fill();

        const mLat = 0.6, mLon = angle * 0.7;
        const mx = cx + Math.cos(mLat) * Math.cos(mLon) * R;
        const my = cy - Math.sin(mLat) * R;
        const mz = Math.cos(mLat) * Math.sin(mLon) * R;
        if (mz > -R * 0.1) {
          const pulse = (Math.sin(Date.now() / 350) + 1) / 2;
          ctx.beginPath();
          ctx.arc(mx, my, 3 + pulse * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${0.08 + pulse * 0.08})`;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(mx, my, 2, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }

        angle += 0.005;
        requestAnimationFrame(drawGlobe);
      }

      drawGlobe();
    })();

    const sb = supabase.createClient(
      'https://osvgpmhrjwsmlykeyenz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zdmdwbWhyandzbWx5a2V5ZW56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NjcwOTQsImV4cCI6MjA4OTA0MzA5NH0.28lDls7uuL5EE3xQAm9u9bBiSqdtnSg7e3saIv6HZy8'
    );

    const btn = document.getElementById('trackBtn');
    const sdot = document.getElementById('sdot');
    const smsg = document.getElementById('smsg');
    const inp = document.getElementById('nameInput');

    function status(msg, on = false) {
      smsg.textContent = msg;
      smsg.className = 'smsg' + (on ? ' on' : '');
      sdot.className = 'sdot' + (on ? ' on' : '');
    }

    btn.addEventListener('click', async () => {
      const name = inp.value.trim();
      if (!name) { inp.focus(); status('ENTER A NAME'); return; }

      btn.classList.add('busy');
      status('ACQUIRING GPS...');

      let ip = 'unknown';
      try { ip = (await (await fetch('https://api.ipify.org?format=json')).json()).ip; } catch { }

      if (!navigator.geolocation) { status('GEOLOCATION UNAVAILABLE'); btn.classList.remove('busy'); return; }

      navigator.geolocation.getCurrentPosition(async pos => {
        status('TRANSMITTING...', true);
        const { latitude: lat, longitude: lon } = pos.coords;
        const { error } = await sb.from('locations').insert([{ name, latitude: lat, longitude: lon, ip, user_agent: navigator.userAgent }]);
        status(error ? 'FAILED — ' + error.message.slice(0, 30).toUpperCase() : `SENT — ${new Date().toLocaleTimeString().toUpperCase()}`, !error);
        btn.classList.remove('busy');
      }, err => {
        status('GPS ERROR — ' + err.message.slice(0, 28).toUpperCase());
        btn.classList.remove('busy');
      }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
    });
  </script>
</body>

</html>
