<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAZATOR · gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --text-main: #ffffff;
      --text-muted: #666666;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .paza-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      padding: 12px 28px;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s;
      backdrop-filter: blur(5px);
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
    }

    .paza-btn:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 8%;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .gallery-header:hover {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .gallery-header h1 {
      font-weight: 400;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .gallery-header h1 span {
      color: var(--text-muted);
      font-weight: 300;
      font-size: 0.5em;
      margin-left: 0.5rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      padding: 60px 8% 80px;
    }

    .gallery-item {
      background: transparent;
      border: 1px solid var(--border);
      transition: border-color 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .gallery-item:hover {
      border-color: #fff;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: object-fit 0.2s ease;
      background-color: #111;
    }

    .gallery-item:hover img {
      object-fit: contain;
    }

    .gallery-item {
      opacity: 0;
      animation: appear 0.6s ease forwards;
    }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gallery-item:nth-child(1) {
      animation-delay: 0.02s;
    }

    .gallery-item:nth-child(2) {
      animation-delay: 0.05s;
    }

    .gallery-item:nth-child(3) {
      animation-delay: 0.08s;
    }

    .gallery-item:nth-child(4) {
      animation-delay: 0.11s;
    }

    .gallery-item:nth-child(5) {
      animation-delay: 0.14s;
    }

    .gallery-item:nth-child(6) {
      animation-delay: 0.17s;
    }

    .gallery-item:nth-child(7) {
      animation-delay: 0.20s;
    }

    .gallery-item:nth-child(8) {
      animation-delay: 0.23s;
    }

    .gallery-item:nth-child(9) {
      animation-delay: 0.26s;
    }

    .gallery-item:nth-child(10) {
      animation-delay: 0.29s;
    }

    .gallery-item:nth-child(11) {
      animation-delay: 0.32s;
    }

    .gallery-item:nth-child(12) {
      animation-delay: 0.35s;
    }

    .gallery-footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 60px 8% 40px;
      text-align: center;
    }

    .gallery-footer .wordmark {
      font-size: clamp(3rem, 15vw, 8rem);
      font-weight: 900;
      color: #0f0f0f;
      letter-spacing: -0.05em;
      transition: color 0.5s ease;
      user-select: none;
      line-height: 1;
    }

    .gallery-footer .wordmark:hover {
      color: #fff;
    }

    .gallery-footer small {
      color: var(--text-muted);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      display: block;
      margin-top: 1rem;
    }

    .back-link {
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .gallery-header {
        padding: 25px 6%;
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .gallery-grid {
        padding: 40px 6%;
        gap: 1.2rem;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .modal img {
      max-width: 90%;
      max-height: 85vh;
      object-fit: contain;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .modal-close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #fff;
      font-size: 40px;
      font-weight: 300;
      cursor: pointer;
      transition: opacity 0.2s;
      opacity: 0.6;
      line-height: 1;
    }

    .modal-close:hover {
      opacity: 1;
    }

    body.modal-open {
      overflow: hidden;
    }
  </style>
</head>

<body>
  <header class="gallery-header">
    <h1>gallery <span>12 frames</span></h1>
    <a href="https://aix-32.github.io/Pazator/" class="back-link">
      <button class="paza-btn">← back</button>
    </a>
  </header>

  <div class="gallery-grid">
    <div class="gallery-item">
      <img src="./1.png" alt="Pazator capture 1" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./2.png" alt="Pazator capture 2" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./3.png" alt="Pazator capture 3" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./4.png" alt="Pazator capture 4" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./5.png" alt="Pazator capture 5" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./6.png" alt="Pazator capture 6" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./7.png" alt="Pazator capture 7" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./8.png" alt="Pazator capture 8" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./9.png" alt="Pazator capture 9" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./10.png" alt="Pazator capture 10" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./11.png" alt="Pazator capture 11" loading="lazy">
    </div>
    <div class="gallery-item">
      <img src="./12.png" alt="Pazator capture 12" loading="lazy">
    </div>
  </div>

  <footer class="gallery-footer">
    <div class="wordmark">PAZATOR</div>
    <small>Gallery</small>
  </footer>

  <div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img id="modalImage" src="" alt="enlarged view">
  </div>

  <script>
    (function () {
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImage');
      const closeBtn = document.querySelector('.modal-close');
      const items = document.querySelectorAll('.gallery-item');

      function openModal(src) {
        modalImg.src = src;
        modal.style.display = 'flex';
        document.body.classList.add('modal-open');
      }

      function closeModal() {
        modal.style.display = 'none';
        document.body.classList.remove('modal-open');
      }

      items.forEach(item => {
        item.addEventListener('click', () => {
          const img = item.querySelector('img');
          if (img && img.src) {
            openModal(img.src);
          }
        });
      });

      closeBtn.addEventListener('click', closeModal);

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
          closeModal();
        }
      });

      const header = document.querySelector('.gallery-header');
      if (header) {
        header.addEventListener('mouseenter', () => {
          header.style.borderBottomColor = 'rgba(255,255,255,0.3)';
        });
        header.addEventListener('mouseleave', () => {
          header.style.borderBottomColor = '';
        });
      }
    })();
  </script>
</body>

</html>
