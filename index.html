<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pazator. Mass Data Intelligence Platform</title>
    <meta name="description" content="Pazator is a company focused on operational systems and intelligence solutions.">
    <meta name="keywords" content="Pazator, operational systems, intelligence solutions, AIOIP, Tirsun, Vundra">
    <meta name="author" content="Xyper">
    <meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --bg: #050505;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-gate {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .gate-text {
            font-size: 24vw;
            font-weight: 900;
            line-height: 0.7;
            letter-spacing: -0.07em;
            text-transform: uppercase;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
            z-index: 2;
        }

        .text-top {
            transform: translateX(-100%);
        }

        .text-bottom {
            transform: translateX(100%);
            align-self: flex-end;
        }

        .loaded .text-top,
        .loaded .text-bottom {
            transform: translateX(0);
        }

        .hero-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 15px;
            opacity: 0;
            transition: opacity 1s ease 1s;
            z-index: 10;
        }

        .loaded .hero-controls {
            opacity: 1;
        }

        .paza-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px 32px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            backdrop-filter: blur(5px);
        }

        .paza-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 1s ease 1.5s;
        }

        .loaded .scroll-indicator {
            opacity: 0.4;
        }

        .content {
            padding: 0 8% 120px;
            position: relative;
            z-index: 2;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 100px 0 40px;
            border-bottom: 1px solid var(--border);
            transition: border-color 0.4s;
            opacity: 0;
            transform: translateY(30px);
        }

        .row.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .row:hover {
            border-color: #fff;
        }

        .row h2 {
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        .row-info {
            color: var(--text-muted);
            max-width: 320px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: right;
        }

        .footer-logo {
            font-size: 15vw;
            font-weight: 900;
            color: #0f0f0f;
            letter-spacing: -0.05em;
            text-align: center;
            padding: 100px 0;
            cursor: default;
            transition: color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .footer-logo:hover {
            color: #fff;
        }

        #hover-logo {
            position: fixed;
            width: 200px;
            height: auto;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.1s ease;
        }

        @media (max-width: 768px) {
            .row {
                flex-direction: column;
                align-items: flex-start;
            }

            .row-info {
                text-align: left;
                margin-top: 10px;
            }

            .hero-controls {
                flex-direction: column;
                width: 80%;
            }
        }

        .whitebtn {

            background-color: #fff;
            color: #000;

        }

        .whitebtn:hover {
            background-color: transparent;
            color: #000000;
            border-color: var(--border);
        }
    </style>
</head>

<body>

    <img src="./favicon.png" id="hover-logo" alt="Logo" style="filter: invert(1) brightness(2) saturate(0);"> 
    <div id="loader">
        <p style="letter-spacing: 0.8em; font-size: 10px;">INITIALIZING</p>
    </div>

    <header class="hero-gate" id="heroGate">
        <div class="gate-text text-top">PAZA</div>

        <div class="hero-controls">
            <button class="paza-btn whitebtn" id="try-btn" onclick="window.location.href='./app'">TRY NOW.</button>
            <button class="paza-btn" onclick="window.open('https://discord.gg/74c9RBYD4R', '_blank')">contact</button>
            <button class="paza-btn" onclick="window.location.href='./gallery'">Gallery</button>

        </div>

        <div class="scroll-indicator">
            <div style="width: 1px; height: 60px; background: linear-gradient(to bottom, transparent, #fff);"></div>
        </div>

        <div class="gate-text text-bottom">TOR</div>
    </header>

    <main class="content">
        <div class="row">
            <h2>AIOIP</h2>
            <div class="row-info">Mass data infrastructure engineered to identify anomalies, assess risk, and deliver
                actionable intelligence before disruption occurs.</div>
        </div>
        <div class="row">
            <h2>Tirsun</h2>
            <div class="row-info">May happen soon.</div>
        </div>
        <div class="row">
            <h2>Vundra</h2>
            <div class="row-info">may happen soon.</div>
        </div>
    </main>

    <footer>
        <div class="footer-logo">PAZATOR</div>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            const gate = document.getElementById('heroGate');
            const tryBtn = document.getElementById('try-btn');
            const hoverLogo = document.getElementById('hover-logo');

            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    gate.classList.add('loaded');
                }, 600);
            }, 800);

            tryBtn.addEventListener('mouseenter', () => {
                hoverLogo.style.opacity = '1';
            });

            tryBtn.addEventListener('mouseleave', () => {
                hoverLogo.style.opacity = '0';
            });

            window.addEventListener('mousemove', (e) => {
                hoverLogo.style.left = e.clientX + 'px';
                hoverLogo.style.top = e.clientY + 'px';
            });

            const rows = document.querySelectorAll('.row');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            rows.forEach(row => observer.observe(row));
        });
    </script>
</body>

</html>
